# No cosign in v0.5-container: keep this first GHCR workflow proportionate.
name: container

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/destynova2/amar
  SMOKE_IMAGE: ghcr.io/destynova2/amar:smoke-${{ github.run_id }}

jobs:
  image:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          set -eu
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            version="$GITHUB_REF_NAME"
          else
            version="$GITHUB_SHA"
          fi
          {
            echo "tags<<EOF"
            echo "${IMAGE}:latest"
            echo "${IMAGE}:${version}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build smoke image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          platforms: linux/amd64
          load: true
          tags: ${{ env.SMOKE_IMAGE }}
          cache-from: type=gha

      - name: Smoke test image
        shell: bash
        run: |
          set -eu
          health="$(mktemp)"
          tide="$(mktemp)"
          cid="$(docker run --rm -d -p 127.0.0.1:3000:3000 "$SMOKE_IMAGE")"
          cleanup() {
            docker stop "$cid" >/dev/null 2>&1 || true
            rm -f "$health" "$tide"
          }
          fail() {
            docker logs "$cid" || true
            exit 1
          }
          trap cleanup EXIT

          ready=0
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000/health > "$health"; then
              ready=1
              break
            fi
            sleep 1
          done
          test "$ready" = "1" || fail
          grep -q '"station_count":30' "$health" || fail

          code="$(curl -sS -o "$tide" -w '%{http_code}' \
            -H 'content-type: application/json' \
            -d '{"lat":37.806,"lon":-122.465,"datetime":"2026-08-15T12:00:00Z"}' \
            http://127.0.0.1:3000/tide)"
          test "$code" = "200" || fail
          grep -q '"id":"noaa:9414290"' "$tide" || fail

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
